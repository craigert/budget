<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<!-- Status bar / address bar tint. The runtime theme engine rewrites this
		     meta to match the active palette's --bs-bg on init; the initial
		     value matches the Forest immersive default. -->
		<meta name="theme-color" content="#0E1A11" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="BudgetSparrow" />

		<!-- Type system. Geist + Fraunces is the default (Forest immersive
		     palette); Inter Tight, Space Grotesk, and JetBrains Mono are
		     swappable via the Tweaks panel. All shipped together so palette/
		     typography switches are instant — no FOIT on first paint. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;450;500;600&family=Geist+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
		/>
		<!--
			Web app manifest. Path is fixed by vite-plugin-pwa
			(filename: 'manifest.webmanifest', emitted at the site root).
			Without this link, iOS Safari and Chrome's PWA criteria can't
			discover the manifest, so Add-to-Home-Screen creates a plain
			bookmark instead of a standalone-mode app icon.
		-->
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<link rel="icon" type="image/png" sizes="64x64" href="%sveltekit.assets%/icons/icon-64.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/icons/icon-192.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/icons/apple-touch-icon.png" />

		<!--
			iOS launch images. Without these the installed app shows a white
			flash on every launch. Each <link> must match the device's CSS
			resolution AND device-pixel-ratio. Generated by scripts/gen-icons.mjs.
		-->
		<!-- iPhone 14 Pro Max / 15 Plus (430x932@3x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<!-- iPhone 14 Pro / 15 (393x852@3x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<!-- iPhone 14 Plus / 13 Pro Max / 12 Pro Max (428x926@3x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-1284x2778.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<!-- iPhone 14 / 13 / 13 Pro / 12 / 12 Pro (390x844@3x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<!-- iPhone 13 mini / 12 mini / 11 Pro / XS / X (375x812@3x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<!-- iPhone 11 Pro Max / XS Max (414x896@3x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<!-- iPhone 11 / XR (414x896@2x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-828x1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
		<!-- iPhone 8 Plus / 7 Plus / 6 Plus (414x736@3x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
		<!-- iPhone 8 / 7 / 6s / 6 / SE 2-3 (375x667@2x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
		<!-- iPhone SE 1st gen / 5 / 5s (320x568@2x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
		<!-- iPad Pro 12.9" (1024x1366@2x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
		<!-- iPad Pro 11" / Air 10.9" (834x1194@2x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-1668x2388.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
		<!-- iPad 10.5" (834x1112@2x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-1668x2224.png" media="(device-width: 834px) and (device-height: 1112px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
		<!-- iPad mini / Air 2 (768x1024@2x) -->
		<link rel="apple-touch-startup-image" href="%sveltekit.assets%/splash/splash-1536x2048.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="min-h-full">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
